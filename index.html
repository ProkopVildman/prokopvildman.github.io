<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prokopův web</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap');

/* Základní styl stránky */
body {
    background-color: #e3f2fd;
    font-family: 'Prompt', sans-serif;
    color: #212121;
    text-align: center;
    padding: 20px;
}

/* Nadpis */
h1 {
    font-size: 40px;
    color: #0d47a1;
    margin-bottom: 20px;
}

/* Odstavec */
p {
    font-size: 20px;
    text-align: center;
    margin-bottom: 20px;
}

/* Seznam */
ul {
    list-style: none;
    padding: 0;
    font-size: 18px;
}

/* Odkaz */
a {
    color: #1565c0;
    text-decoration: none;
    font-weight: bold;
}

a:hover {
    color: #d32f2f;
}

/* Obrázek */
img {
    border: 3px solid #1976d2;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    margin-top: 20px;
}</style>
<body>
    <h1>Ahoj, já jsem Prokop</h1>
    <p>Jezdím Enduro a Downhill na kole</p>
    <ul>
        <li>Oblíbená věc: Horské kolo</li>
        <li>Oblíbená věc: Motorky</li>
        <li>Oblíbená věc: Auta</li>
    </ul>
    <img src="https://www.bikepark-online.de/wp-content/bilder/spicak/Spicak-2017-007.jpg" width="400">
    <br>
    <a href="https://www.trekbikes.com/cz/cs_CZ/"target="_blank">Trek bikes</a>
<!-- YouTube video -->
    <div class="video-container">
        <h2>Moje oblíbené video</h2>
        <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/FwUhklR4NOI?si=56GWEPf97nZPAo_v" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
